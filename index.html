<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RECOVERIC 작업의뢰서 시스템 v2.0</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', -apple-system, sans-serif; background: #f5f5f5; color: #222; font-size: 14px; }
  
  .app { display: grid; grid-template-columns: 280px 1fr 1fr; height: 100vh; }
  .sidebar { background: #1a1a1a; color: #fff; padding: 20px; overflow-y: auto; }
  .form-panel { background: #fff; padding: 24px; overflow-y: auto; border-right: 1px solid #ddd; }
  .preview-panel { background: #e8e8e8; padding: 24px; overflow-y: auto; }
  
  .sidebar h1 { font-size: 16px; margin-bottom: 4px; letter-spacing: -0.5px; }
  .sidebar .sub { font-size: 11px; color: #888; margin-bottom: 20px; }
  .user-info { background: #2a2a2a; padding: 10px; border-radius: 4px; font-size: 11px; margin-bottom: 16px; }
  .user-info .name { color: #fff; font-weight: 500; margin-bottom: 2px; }
  .user-info .email { color: #888; font-size: 10px; margin-bottom: 6px; }
  .logout-btn { background: transparent; color: #888; border: 1px solid #444; padding: 3px 8px; border-radius: 3px; cursor: pointer; font-size: 10px; }
  .logout-btn:hover { color: #fff; border-color: #fff; }
  
  .type-selector { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; margin-bottom: 12px; }
  .type-btn { background: #2a2a2a; color: #aaa; border: 1px solid #333; padding: 8px 4px; border-radius: 3px; cursor: pointer; font-size: 11px; font-weight: 500; }
  .type-btn:hover { background: #3a3a3a; color: #fff; }
  .type-btn.active { background: #fff; color: #000; border-color: #fff; }
  
  .new-btn { background: #000; color: #fff; border: none; padding: 10px; width: 100%; border-radius: 3px; cursor: pointer; font-size: 13px; font-weight: 600; margin-bottom: 12px; }
  .new-btn:hover { background: #333; }
  
  .history-title { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; margin-top: 16px; }
  .history-item { background: #2a2a2a; padding: 10px; border-radius: 3px; margin-bottom: 6px; cursor: pointer; font-size: 12px; transition: background 0.2s; }
  .history-item:hover { background: #3a3a3a; }
  .history-item.active { background: #fff; color: #000; }
  .history-item.active .item-num, .history-item.active .item-meta { color: #555; }
  .history-item.active .item-type { color: #000; background: #000; color: #fff; }
  .history-item .item-num { color: #999; font-size: 10px; margin-bottom: 2px; }
  .history-item .item-type { display: inline-block; background: #444; color: #fff; padding: 1px 5px; border-radius: 2px; font-size: 9px; margin-right: 4px; }
  .history-item .item-title { font-weight: 500; margin-bottom: 2px; color: #fff; }
  .history-item .item-meta { color: #888; font-size: 10px; }
  .history-empty { color: #555; font-size: 11px; padding: 20px 0; text-align: center; }
  
  .form-panel h2 { font-size: 15px; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid #222; display: flex; justify-content: space-between; align-items: center; }
  .form-panel h2 .type-badge { background: #000; color: #fff; font-size: 11px; padding: 3px 8px; border-radius: 3px; font-weight: 500; }
  
  .section { margin-bottom: 18px; }
  .section-title { font-size: 11px; font-weight: 600; color: #444; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid #eee; }
  .field { margin-bottom: 10px; }
  .field label { display: block; font-size: 11px; color: #666; margin-bottom: 3px; }
  .field input, .field select, .field textarea {
    width: 100%; padding: 6px 8px; border: 1px solid #ccc; border-radius: 3px; font-size: 13px; font-family: inherit;
  }
  .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: #000; }
  .field textarea { resize: vertical; min-height: 50px; }
  .row { display: grid; gap: 8px; }
  .row-2 { grid-template-columns: 1fr 1fr; }
  .row-3 { grid-template-columns: 1fr 1fr 1fr; }
  .row-yarn { grid-template-columns: 40px 1fr 40px 1fr 40px 1fr; align-items: center; }
  .row-yarn label { font-size: 11px; color: #666; text-align: right; padding-right: 4px; margin: 0; }
  .row-yarn input { padding: 4px 6px; font-size: 12px; }
  
  /* 공정 체크박스 */
  .process-checks { display: flex; gap: 12px; padding: 10px; background: #f8f8f8; border-radius: 4px; margin-bottom: 10px; }
  .process-check { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px; font-weight: 500; }
  .process-check input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
  
  /* 주의사항 */
  .caution-block { border: 1px solid #e0e0e0; border-radius: 4px; padding: 10px; margin-bottom: 8px; }
  .caution-block-title { font-size: 12px; font-weight: 600; margin-bottom: 8px; color: #333; }
  .caution-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .caution-item { display: flex; align-items: center; gap: 4px; }
  .caution-item label { font-size: 11px; color: #444; white-space: nowrap; width: 70px; margin: 0; }
  .caution-item input[type="text"] { flex: 1; padding: 3px 6px; font-size: 11px; }
  
  /* 컬러/품목 행 */
  .item-row { display: grid; gap: 6px; margin-bottom: 4px; align-items: center; }
  .item-row input, .item-row select { padding: 4px 6px; font-size: 12px; }
  .color-row { grid-template-columns: 1fr 70px 70px 30px; }
  .yarn-row { grid-template-columns: 1fr 80px 70px 1fr 30px; }
  .knit-row { grid-template-columns: 1fr 1fr 70px 70px 1fr 30px; }
  .btn-del { background: #000; color: #fff; border: none; border-radius: 3px; cursor: pointer; height: 26px; font-size: 11px; }
  .btn-add { background: #000; color: #fff; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-size: 11px; margin-top: 4px; }
  
  .actions { position: sticky; bottom: 0; background: #fff; padding-top: 12px; margin-top: 20px; border-top: 1px solid #eee; display: flex; gap: 8px; }
  .btn-save { flex: 1; background: #000; color: #fff; border: none; padding: 10px; border-radius: 3px; cursor: pointer; font-size: 13px; font-weight: 600; }
  .btn-save:hover:not(:disabled) { background: #333; }
  .btn-save:disabled { background: #999; cursor: not-allowed; }
  .btn-delete-wo { background: #fff; color: #000; border: 1px solid #000; padding: 10px 14px; border-radius: 3px; cursor: pointer; font-size: 12px; }
  .btn-delete-wo:hover { background: #000; color: #fff; }
  
  .preview-toolbar { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .action-btn { background: #000; color: #fff; border: none; padding: 7px 14px; border-radius: 3px; cursor: pointer; font-size: 12px; font-weight: 500; }
  .action-btn:hover { background: #333; }
  .action-btn.outline { background: #fff; color: #000; border: 1px solid #000; }
  .action-btn.outline:hover { background: #000; color: #fff; }
  .action-btn:disabled { background: #aaa; cursor: not-allowed; }
  
  /* ==============================
     작업의뢰서 문서 (흑백 프린트용)
     ============================== */
  .wo-doc { 
    background: #fff; padding: 36px; max-width: 720px; margin: 0 auto; 
    font-family: 'Malgun Gothic', 'Batang', serif; color: #000; 
    box-shadow: 0 2px 8px rgba(0,0,0,0.1); font-size: 12px; line-height: 1.5;
  }
  
  /* 공통 헤더 (회사 레터헤드) */
  .wo-letterhead { 
    border-bottom: 3px double #000; padding-bottom: 12px; margin-bottom: 16px;
  }
  .wo-letterhead .company-name { 
    font-size: 18px; font-weight: 700; letter-spacing: 1px; margin-bottom: 4px;
  }
  .wo-letterhead .company-info { 
    font-size: 10px; line-height: 1.6; color: #000;
  }
  .wo-letterhead .company-info span { margin-right: 10px; }
  
  .wo-title-banner { 
    text-align: center; font-size: 18px; font-weight: 700; 
    padding: 10px; border: 2px solid #000; margin-bottom: 16px; letter-spacing: 4px;
  }
  
  .wo-meta { 
    display: flex; justify-content: space-between; font-size: 11px; 
    margin-bottom: 14px; border-bottom: 1px solid #000; padding-bottom: 6px;
  }
  
  .wo-recipient-box {
    border: 1px solid #000; padding: 8px 12px; margin-bottom: 14px;
    font-size: 12px;
  }
  .wo-recipient-box .label { font-weight: 700; display: inline-block; width: 60px; }
  
  .wo-greeting {
    font-size: 11px; margin-bottom: 4px; color: #000;
  }
  
  .wo-section-header { 
    background: #000; color: #fff; padding: 5px 10px; font-size: 12px; 
    font-weight: 600; margin: 14px 0 6px; letter-spacing: 1px;
  }
  
  .wo-table { width: 100%; border-collapse: collapse; font-size: 11px; }
  .wo-table th { background: #000; color: #fff; padding: 6px; border: 1px solid #000; font-weight: 600; }
  .wo-table td { border: 1px solid #000; padding: 5px 8px; vertical-align: middle; }
  .wo-table td.label { background: #e8e8e8; font-weight: 600; text-align: center; width: 80px; }
  .wo-table tr.total td { background: #e8e8e8; font-weight: 700; }
  .wo-table td.center { text-align: center; }
  .wo-table td.right { text-align: right; }
  
  .wo-caution-table { width: 100%; border-collapse: collapse; font-size: 10px; margin-bottom: 6px; }
  .wo-caution-table td { padding: 3px 6px; vertical-align: middle; border: 1px solid #000; }
  .wo-caution-table td.star { width: 18px; text-align: center; font-weight: bold; }
  .wo-caution-header { 
    background: #333; color: #fff; padding: 4px 8px; font-size: 11px; 
    font-weight: 600; border: 1px solid #000;
  }
  
  .wo-notes { 
    margin-top: 12px; padding: 10px; border: 1px dashed #000;
    font-size: 11px; white-space: pre-wrap; 
  }
  
  .wo-footer { 
    margin-top: 24px; padding-top: 14px; border-top: 3px double #000; 
    font-size: 9px; color: #000; line-height: 1.6;
  }
  .wo-footer .sign-off { 
    text-align: right; font-size: 12px; font-weight: 600; 
    margin-top: 10px; padding-top: 10px; border-top: 1px solid #000;
  }
  
  /* 편직 의뢰서 전용 */
  .wo-knit-item {
    border-left: 4px solid #000; padding: 10px 14px; margin-bottom: 12px;
    background: #fafafa;
  }
  .wo-knit-item-num {
    font-weight: 700; font-size: 13px; margin-bottom: 6px;
  }
  .wo-knit-detail {
    font-size: 11px; line-height: 1.8;
  }
  .wo-knit-detail .kd-label { display: inline-block; min-width: 80px; color: #333; }
  
  .save-status { font-size: 11px; color: #888; padding: 8px 0 0; text-align: center; }
  .save-status.unsaved { color: #000; font-weight: 500; }
  .save-status.saved { color: #000; }
  
  @media print {
    .sidebar, .form-panel, .preview-toolbar { display: none !important; }
    .preview-panel { padding: 0; background: #fff; overflow: visible; }
    .wo-doc { box-shadow: none; max-width: 100%; padding: 20px; }
    .app { display: block; height: auto; }
    .wo-section-header { background: #000 !important; color: #fff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .wo-table th { background: #000 !important; color: #fff !important; -webkit-print-color-adjust: exact; }
    .wo-table td.label, .wo-table tr.total td { background: #e8e8e8 !important; -webkit-print-color-adjust: exact; }
    .wo-caution-header { background: #333 !important; color: #fff !important; -webkit-print-color-adjust: exact; }
  }
  
  .toast { position: fixed; top: 20px; right: 20px; background: #000; color: #fff; padding: 12px 20px; border-radius: 3px; font-size: 13px; z-index: 1000; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .toast.error { background: #fff; color: #000; border: 2px solid #000; }
  .toast.success { background: #000; color: #fff; }
  
  .login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; background: #f5f5f5; }
  .login-card { background: #fff; padding: 40px; border-radius: 4px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: center; max-width: 360px; border: 1px solid #000; }
  .login-card h1 { margin-bottom: 6px; font-size: 22px; letter-spacing: 2px; }
  .login-card .sub { color: #888; font-size: 12px; margin-bottom: 24px; }
  .login-card button { background: #000; color: #fff; border: none; padding: 12px 24px; border-radius: 3px; cursor: pointer; font-size: 14px; font-weight: 500; width: 100%; }
  .login-card button:hover { background: #333; }
</style>
</head>
<body>

<div class="login-screen" id="login-screen">
  <div class="login-card">
    <h1>RECOVERIC</h1>
    <div class="sub">HIWOS · 작업의뢰서 시스템</div>
    <button id="login-btn-main">Google 계정으로 로그인</button>
  </div>
</div>

<div class="app" id="main-app" style="display:none;">
  <aside class="sidebar">
    <h1>RECOVERIC</h1>
    <div class="sub">HIWOS v2.0</div>
    <div id="user-info-section"></div>
    
    <div class="type-selector">
      <button class="type-btn active" data-type="원사">원사</button>
      <button class="type-btn" data-type="편직">편직</button>
      <button class="type-btn" data-type="염색가공">염색가공</button>
    </div>
    <button class="new-btn" id="new-btn">+ 새 의뢰서</button>
    
    <div class="history-title">이력 (전체)</div>
    <div id="history-list"><div class="history-empty">불러오는 중...</div></div>
  </aside>
  
  <section class="form-panel" id="form-panel">
    <h2>
      <span id="form-title">작업의뢰서 입력</span>
      <span class="type-badge" id="type-badge">원사</span>
    </h2>
    
    <!-- 원사 발주서 폼 -->
    <div id="form-yarn">
      <div class="section">
        <div class="section-title">기본 정보</div>
        <div class="row row-2">
          <div class="field">
            <label>발주일</label>
            <input type="date" id="y_date">
          </div>
          <div class="field">
            <label>수신처 (원사 공장)</label>
            <input type="text" id="y_supplier" placeholder="한국 씨엔티 오재선 팀장님">
          </div>
        </div>
      </div>
      
      <div class="section">
        <div class="section-title">원사 내역</div>
        <div class="item-row yarn-row" style="font-size:10px; color:#666;">
          <div>사종</div><div>수량</div><div>단위</div><div>출고처</div><div></div>
        </div>
        <div id="yarn-items"></div>
        <button class="btn-add" id="add-yarn">+ 사종 추가</button>
      </div>
      
      <div class="section">
        <div class="section-title">추가 정보</div>
        <div class="row row-2">
          <div class="field">
            <label>납기일</label>
            <input type="text" id="y_delivery" placeholder="지급 / 2026-05-01 등">
          </div>
          <div class="field">
            <label>용도 (선택)</label>
            <input type="text" id="y_purpose" placeholder="NSC-울싱 / 365T용">
          </div>
        </div>
        <div class="field">
          <label>메모</label>
          <textarea id="y_notes" placeholder="추가 전달사항"></textarea>
        </div>
      </div>
    </div>
    
    <!-- 편직 의뢰서 폼 -->
    <div id="form-knit" style="display:none;">
      <div class="section">
        <div class="section-title">기본 정보</div>
        <div class="row row-2">
          <div class="field">
            <label>의뢰일</label>
            <input type="date" id="k_date">
          </div>
          <div class="field">
            <label>수신처 (편직 공장)</label>
            <input type="text" id="k_recipient" placeholder="세원">
          </div>
        </div>
      </div>
      
      <div class="section">
        <div class="section-title">편직 품목 (여러 개 가능)</div>
        <div class="item-row knit-row" style="font-size:10px; color:#666;">
          <div>품목명</div><div>컬러</div><div>절(Roll)</div><div>kg/절</div><div>원사 입고</div><div></div>
        </div>
        <div id="knit-items"></div>
        <button class="btn-add" id="add-knit">+ 품목 추가</button>
      </div>
      
      <div class="section">
        <div class="section-title">메모</div>
        <div class="field">
          <textarea id="k_notes" placeholder="편직 부탁 드립니다 등"></textarea>
        </div>
      </div>
    </div>
    
    <!-- 염색가공 의뢰서 폼 -->
    <div id="form-finish" style="display:none;">
      <div class="section">
        <div class="section-title">공정 선택 (1개 이상 체크)</div>
        <div class="process-checks">
          <label class="process-check"><input type="checkbox" id="p_dyeing" checked> 염색</label>
          <label class="process-check"><input type="checkbox" id="p_proc" checked> 가공</label>
          <label class="process-check"><input type="checkbox" id="p_post"> 후가공</label>
        </div>
      </div>
      
      <div class="section">
        <div class="section-title">기본 정보</div>
        <div class="row row-3">
          <div class="field">
            <label>발주일</label>
            <input type="date" id="f_date">
          </div>
          <div class="field">
            <label>생산구분</label>
            <select id="f_type">
              <option value="오더">오더</option>
              <option value="기획">기획</option>
              <option value="샘플">샘플</option>
              <option value="재염">재염</option>
            </select>
          </div>
          <div class="field">
            <label>최종입고처</label>
            <input type="text" id="f_dest" placeholder="세원">
          </div>
        </div>
      </div>
      
      <div class="section">
        <div class="section-title">수신처</div>
        <div id="f_recipients"></div>
      </div>
      
      <div class="section">
        <div class="section-title">BODY</div>
        <div class="field">
          <label>품목</label>
          <input type="text" id="f_item" placeholder="프리미엄싱글">
        </div>
        <div class="row row-2">
          <div class="field">
            <label>입고처</label>
            <input type="text" id="f_receiving" placeholder="세원">
          </div>
          <div class="field">
            <label>출고처</label>
            <input type="text" id="f_shipping" placeholder="대흥">
          </div>
        </div>
        <div class="field">
          <label>사종</label>
          <div class="row row-yarn">
            <label>면</label><input type="text" id="f_cotton" placeholder="55">
            <label>포리</label><input type="text" id="f_poly" placeholder="45">
            <label>스판</label><input type="text" id="f_span">
          </div>
        </div>
        <div class="field">
          <label>가공 사양</label>
          <input type="text" id="f_spec" placeholder="텐컴 후 70/72+400">
        </div>
      </div>
      
      <div class="section">
        <div class="section-title">주의사항</div>
        <div id="f_cautions"></div>
      </div>
      
      <div class="section">
        <div class="section-title">컬러 & 수량 (절 단위)</div>
        <div class="item-row color-row" style="font-size:10px; color:#666;">
          <div>컬러명</div><div>몸판(절)</div><div>리프(절)</div><div></div>
        </div>
        <div id="f_colors"></div>
        <button class="btn-add" id="add-color">+ 컬러 추가</button>
      </div>
      
      <div class="section">
        <div class="section-title">메모</div>
        <div class="field">
          <textarea id="f_notes" placeholder="몸판 : 양사이드 염색 + 텐타 + 컴팩 / 70/72*390g/y"></textarea>
        </div>
      </div>
    </div>
    
    <div class="actions">
      <button class="btn-save" id="save-btn">저장</button>
      <button class="btn-delete-wo" id="delete-btn" style="display:none;">삭제</button>
    </div>
    <div class="save-status" id="save-status"></div>
  </section>
  
  <section class="preview-panel">
    <div class="preview-toolbar">
      <button class="action-btn" id="btn-image">이미지 저장</button>
      <button class="action-btn outline" id="btn-copy">클립보드 복사</button>
      <button class="action-btn outline" id="btn-print">프린트</button>
      <button class="action-btn outline" id="btn-kakao" style="display:none;">카톡 텍스트 복사</button>
    </div>
    <div id="preview-container">
      <div class="wo-doc" id="wo-doc"></div>
    </div>
  </section>
</div>

<div class="toast" id="toast"></div>

<script>
const KORI_KG = 181.44;

const state = {
  currentType: '원사',
  currentWorkOrderId: null,
  user: null,
  allWorkOrders: [],
  isDirty: false,
  unsubscribe: null
};

function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  setTimeout(() => el.className = 'toast', 2500);
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function markDirty() {
  if (!state.isDirty) {
    state.isDirty = true;
    updateSaveStatus('● 저장되지 않은 변경사항', 'unsaved');
  }
}

function updateSaveStatus(text, type='') {
  const el = document.getElementById('save-status');
  el.textContent = text;
  el.className = 'save-status ' + type;
}

// ===== 원사 행 =====
function addYarnRow(data={}) {
  const container = document.getElementById('yarn-items');
  const row = document.createElement('div');
  row.className = 'item-row yarn-row';
  row.innerHTML = `
    <input type="text" class="y-type" placeholder="CM20/1" value="${escapeHtml(data.type || '')}">
    <input type="number" class="y-qty" placeholder="1" value="${data.qty || ''}" step="0.01">
    <select class="y-unit">
      <option value="고리" ${data.unit === '고리' ? 'selected' : ''}>고리</option>
      <option value="박스" ${data.unit === '박스' ? 'selected' : ''}>박스</option>
      <option value="kg" ${data.unit === 'kg' ? 'selected' : ''}>kg</option>
      <option value="롤" ${data.unit === '롤' ? 'selected' : ''}>롤</option>
    </select>
    <input type="text" class="y-dest" placeholder="NSC섬유" value="${escapeHtml(data.dest || '')}">
    <button class="btn-del">X</button>
  `;
  row.querySelectorAll('input, select').forEach(inp => inp.addEventListener('input', () => { render(); markDirty(); }));
  row.querySelector('.btn-del').addEventListener('click', () => { row.remove(); render(); markDirty(); });
  container.appendChild(row);
}

// ===== 편직 행 =====
function addKnitRow(data={}) {
  const container = document.getElementById('knit-items');
  const row = document.createElement('div');
  row.className = 'item-row knit-row';
  row.innerHTML = `
    <input type="text" class="k-item" placeholder="프리미엄싱글" value="${escapeHtml(data.item || '')}">
    <input type="text" class="k-color" placeholder="로화이트" value="${escapeHtml(data.color || '')}">
    <input type="number" class="k-jul" placeholder="300" value="${data.jul || ''}" step="1">
    <input type="number" class="k-kg" placeholder="21" value="${data.kg_per_jul || 21}" step="0.1">
    <input type="text" class="k-yarn" placeholder="CM30수 20고리" value="${escapeHtml(data.yarn_input || '')}">
    <button class="btn-del">X</button>
  `;
  row.querySelectorAll('input').forEach(inp => inp.addEventListener('input', () => { render(); markDirty(); }));
  row.querySelector('.btn-del').addEventListener('click', () => { row.remove(); render(); markDirty(); });
  container.appendChild(row);
}

// ===== 컬러 행 (염색가공) =====
function addColorRow(data={}) {
  const container = document.getElementById('f_colors');
  const row = document.createElement('div');
  row.className = 'item-row color-row';
  row.innerHTML = `
    <input type="text" class="c-name" placeholder="프진먹색 #451A" value="${escapeHtml(data.name || '')}">
    <input type="number" class="c-body" placeholder="8" value="${data.body || ''}" step="0.5">
    <input type="number" class="c-rib" placeholder="1" value="${data.rib || ''}" step="0.5">
    <button class="btn-del">X</button>
  `;
  row.querySelectorAll('input').forEach(inp => inp.addEventListener('input', () => { render(); markDirty(); }));
  row.querySelector('.btn-del').addEventListener('click', () => { row.remove(); render(); markDirty(); });
  container.appendChild(row);
}

// ===== 염색가공 수신처·주의사항 동적 렌더 =====
function renderFinishRecipients() {
  const dye = document.getElementById('p_dyeing').checked;
  const proc = document.getElementById('p_proc').checked;
  const post = document.getElementById('p_post').checked;
  const c = document.getElementById('f_recipients');
  let html = '<div class="row row-2">';
  if (dye) html += `<div class="field"><label>염색처</label><input type="text" id="f_r_dye" placeholder="대흥염색" value="${escapeHtml(state.savedRecipients?.dye || '')}"></div>`;
  if (proc) html += `<div class="field"><label>가공처</label><input type="text" id="f_r_proc" placeholder="대흥가공" value="${escapeHtml(state.savedRecipients?.proc || '')}"></div>`;
  if (post) html += `<div class="field"><label>후가공처</label><input type="text" id="f_r_post" placeholder="후가공 업체" value="${escapeHtml(state.savedRecipients?.post || '')}"></div>`;
  html += '</div>';
  c.innerHTML = html;
  c.querySelectorAll('input').forEach(inp => inp.addEventListener('input', () => { render(); markDirty(); }));
}

      <div class="caution-item"><label>터치</label><input type="text" id="c_touch" value="${escapeHtml(sv.touch || '부드럽게')}"></div>
      <div class="caution-item"><label>선바이오</label><input type="text" id="c_bio" value="${escapeHtml(sv.bio || 'X')}"></div>
      <div class="caution-item"><label>시와주의</label><input type="text" id="c_shiwa" value="${escapeHtml(sv.shiwa || 'O')}"></div>
      <div class="caution-item"><label>뜯김주의</label><input type="text" id="c_tearing" value="${escapeHtml(sv.tearing || 'O')}"></div>
      <div class="caution-item"><label>광목자국</label><input type="text" id="c_lightmark" value="${escapeHtml(sv.lightmark || 'O')}"></div>
      <div class="caution-item"><label>대전방지</label><input type="text" id="c_antistatic" value="${escapeHtml(sv.antistatic || 'O')}"></div>
    </div></div>`;
  }
  if (proc) {
    html += `<div class="caution-block"><div class="caution-block-title">■ 가공</div><div class="caution-grid">
      <div class="caution-item"><label>유연제</label><input type="text" id="c_softener" value="${escapeHtml(sv.softener || 'O')}"></div>
      <div class="caution-item"><label>정상가공</label><input type="text" id="c_normal" value="${escapeHtml(sv.normal || 'O')}"></div>
      <div class="caution-item"><label>KC인증</label><input type="text" id="c_kc" value="${escapeHtml(sv.kc || 'O')}"></div>
      <div class="caution-item"><label>견뢰도</label><input type="text" id="c_fastness" value="${escapeHtml(sv.fastness || 'O')}"></div>
      <div class="caution-item"><label>탈유제</label><input type="text" id="c_oil" value="${escapeHtml(sv.oil || 'O')}"></div>
      <div class="caution-item"><label>냄새주의</label><input type="text" id="c_smell" value="${escapeHtml(sv.smell || 'O')}"></div>
    </div></div>`;
  }
  if (post) {
    html += `<div class="caution-block"><div class="caution-block-title">■ 후가공</div><div class="caution-grid">
      <div class="caution-item"><label>기모</label><input type="text" id="c_napping" value="${escapeHtml(sv.napping || '')}"></div>

      <div class="caution-item"><label>기타</label><input type="text" id="c_etc" value="${escapeHtml(sv.etc || '')}"></div>
    </div></div>`;
  }
  c.innerHTML = html || '<div style="font-size:11px;color:#888;padding:8px;">공정을 선택하세요.</div>';

// ===== 폼 데이터 읽기 =====
function getFormData() {
  if (state.currentType === '원사') {
    const yarns = [];
    document.querySelectorAll('#yarn-items .yarn-row').forEach(row => {
      const type = row.querySelector('.y-type').value.trim();
      const qty = parseFloat(row.querySelector('.y-qty').value) || 0;
      const unit = row.querySelector('.y-unit').value;
      const dest = row.querySelector('.y-dest').value.trim();
      if (type || qty || dest) yarns.push({ type, qty, unit, dest });
    });
    return {
      type: '원사',
      date: document.getElementById('y_date').value,
      supplier: document.getElementById('y_supplier').value,
      yarns,
      delivery: document.getElementById('y_delivery').value,
      purpose: document.getElementById('y_purpose').value,
      notes: document.getElementById('y_notes').value
    };
  }
  if (state.currentType === '편직') {
    const items = [];
    document.querySelectorAll('#knit-items .knit-row').forEach(row => {
      const item = row.querySelector('.k-item').value.trim();
      const color = row.querySelector('.k-color').value.trim();
      const jul = parseFloat(row.querySelector('.k-jul').value) || 0;
      const kg_per_jul = parseFloat(row.querySelector('.k-kg').value) || 21;
      const yarn_input = row.querySelector('.k-yarn').value.trim();
      if (item || color || jul) items.push({ item, color, jul, kg_per_jul, yarn_input });
    });
    return {
      type: '편직',
      date: document.getElementById('k_date').value,
      recipient: document.getElementById('k_recipient').value,
      items,
      notes: document.getElementById('k_notes').value
    };
  }
  // 염색가공
  const colors = [];
  document.querySelectorAll('#f_colors .color-row').forEach(row => {
    const name = row.querySelector('.c-name').value.trim();
    const body = parseFloat(row.querySelector('.c-body').value) || 0;
    const rib = parseFloat(row.querySelector('.c-rib').value) || 0;
    if (name || body || rib) colors.push({ name, body, rib });
  });
  const getVal = id => document.getElementById(id)?.value || '';
  const processes = {
    dyeing: document.getElementById('p_dyeing').checked,
    processing: document.getElementById('p_proc').checked,
    post: document.getElementById('p_post').checked
  };
  return {
    type: '염색가공',
    date: getVal('f_date'),
    production_type: getVal('f_type'),
    final_destination: getVal('f_dest'),
    processes,
    recipients: {
      dyeing: getVal('f_r_dye'),
      processing: getVal('f_r_proc'),
      post: getVal('f_r_post')
    },
    body: {
      item: getVal('f_item'),
      receiving: getVal('f_receiving'),
      shipping_from: getVal('f_shipping'),
      yarn: { cotton: getVal('f_cotton'), poly: getVal('f_poly'), span: getVal('f_span') },
      spec: getVal('f_spec')
    },
    caution: {
      touch: getVal('c_touch'), bio: getVal('c_bio'), shiwa: getVal('c_shiwa'),
      tearing: getVal('c_tearing'), lightmark: getVal('c_lightmark'), antistatic: getVal('c_antistatic'),
      softener: getVal('c_softener'), normal: getVal('c_normal'), kc: getVal('c_kc'),
      fastness: getVal('c_fastness'), oil: getVal('c_oil'), smell: getVal('c_smell'),
      napping: getVal('c_napping'), washing: getVal('c_washing'), printing: getVal('c_printing'), etc: getVal('c_etc')
    },
    colors,
    notes: getVal('f_notes')
  };
}

// ===== 폼 데이터 쓰기 =====
function setFormData(d) {
  if (!d) return;
  switchType(d.type, true);
  
  if (d.type === '원사') {
    document.getElementById('y_date').value = d.date || '';
    document.getElementById('y_supplier').value = d.supplier || '';
    document.getElementById('y_delivery').value = d.delivery || '';
    document.getElementById('y_purpose').value = d.purpose || '';
    document.getElementById('y_notes').value = d.notes || '';
    document.getElementById('yarn-items').innerHTML = '';
    if (d.yarns && d.yarns.length > 0) d.yarns.forEach(y => addYarnRow(y));
    else addYarnRow();
  } else if (d.type === '편직') {
    document.getElementById('k_date').value = d.date || '';
    document.getElementById('k_recipient').value = d.recipient || '';
    document.getElementById('k_notes').value = d.notes || '';
    document.getElementById('knit-items').innerHTML = '';
    if (d.items && d.items.length > 0) d.items.forEach(i => addKnitRow(i));
    else addKnitRow();
  } else if (d.type === '염색가공') {
    document.getElementById('f_date').value = d.date || '';
    document.getElementById('f_type').value = d.production_type || '오더';
    document.getElementById('f_dest').value = d.final_destination || '';
    document.getElementById('p_dyeing').checked = d.processes?.dyeing !== false;
    document.getElementById('p_proc').checked = d.processes?.processing !== false;
    document.getElementById('p_post').checked = d.processes?.post === true;
    
    state.savedRecipients = { dye: d.recipients?.dyeing || '', proc: d.recipients?.processing || '', post: d.recipients?.post || '' };
    state.savedCaution = d.caution || {};
    renderFinishRecipients();
    renderFinishCautions();
    
    document.getElementById('f_item').value = d.body?.item || '';
    document.getElementById('f_receiving').value = d.body?.receiving || '';
    document.getElementById('f_shipping').value = d.body?.shipping_from || '';
    document.getElementById('f_cotton').value = d.body?.yarn?.cotton || '';
    document.getElementById('f_poly').value = d.body?.yarn?.poly || '';
    document.getElementById('f_span').value = d.body?.yarn?.span || '';
    document.getElementById('f_spec').value = d.body?.spec || '';
    document.getElementById('f_notes').value = d.notes || '';
    document.getElementById('f_colors').innerHTML = '';
    if (d.colors && d.colors.length > 0) d.colors.forEach(c => addColorRow(c));
    else addColorRow();
    state.savedRecipients = null;
    state.savedCaution = null;
  }
}

// ===== 타입 전환 =====
function switchType(type, skipReset=false) {
  state.currentType = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.toggle('active', b.dataset.type === type));
  document.getElementById('form-yarn').style.display = type === '원사' ? 'block' : 'none';
  document.getElementById('form-knit').style.display = type === '편직' ? 'block' : 'none';
  document.getElementById('form-finish').style.display = type === '염색가공' ? 'block' : 'none';
  document.getElementById('type-badge').textContent = type;
  document.getElementById('btn-kakao').style.display = type === '편직' ? 'inline-block' : 'none';
  if (!skipReset) resetForm();
}

function resetForm() {
  state.currentWorkOrderId = null;
  state.isDirty = false;
  const today = new Date();
  
  if (state.currentType === '원사') {
    document.getElementById('y_date').valueAsDate = today;
    ['y_supplier','y_delivery','y_purpose','y_notes'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('yarn-items').innerHTML = '';
    addYarnRow();
  } else if (state.currentType === '편직') {
    document.getElementById('k_date').valueAsDate = today;
    ['k_recipient','k_notes'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('knit-items').innerHTML = '';
    addKnitRow();
  } else {
    document.getElementById('f_date').valueAsDate = today;
    document.getElementById('f_type').value = '오더';
    ['f_dest','f_item','f_receiving','f_shipping','f_cotton','f_poly','f_span','f_spec','f_notes'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('p_dyeing').checked = true;
    document.getElementById('p_proc').checked = true;
    document.getElementById('p_post').checked = false;
    state.savedRecipients = null;
    state.savedCaution = null;
    renderFinishRecipients();
    renderFinishCautions();
    document.getElementById('f_colors').innerHTML = '';
    addColorRow();
  }
  
  document.querySelectorAll('.history-item').forEach(el => el.classList.remove('active'));
  document.getElementById('delete-btn').style.display = 'none';
  updateSaveStatus('');
  render();
}

// ===== 원사 발주서 렌더 =====
function renderYarnOrder(d) {
  const dateStr = d.date ? new Date(d.date).toLocaleDateString('ko-KR', {year:'numeric',month:'long',day:'numeric',weekday:'long'}) : '-';
  const totalKg = d.yarns.reduce((s, y) => {
    if (y.unit === '고리') return s + (y.qty * KORI_KG);
    if (y.unit === 'kg') return s + y.qty;
    return s;
  }, 0);
  
  let html = renderLetterhead();
  html += `<div class="wo-title-banner">원 사 발 주 서</div>`;
  html += `<div class="wo-meta"><span>날 짜 : ${dateStr}</span><span>제 목 : 원사 발주의 건</span></div>`;
  html += `<div class="wo-recipient-box"><span class="label">수 신</span>${escapeHtml(d.supplier) || '-'}</div>`;
  html += `<div class="wo-greeting">※ 귀사의 일익 번창하심을 기원합니다.</div>`;
  html += `<div class="wo-greeting">※ 아래의 내용을 참조하시어 납기 일정 및 단가 피드백 부탁드립니다.</div>`;
  
  html += `<table class="wo-table" style="margin-top:10px;">
    <thead><tr><th>사 종</th><th>수 량</th><th>출 고 처</th><th>납 기 일</th><th>용 도</th></tr></thead><tbody>`;
  
  if (d.yarns.length === 0) {
    html += `<tr><td colspan="5" class="center" style="color:#888;">사종을 추가하세요</td></tr>`;
  } else {
    d.yarns.forEach(y => {
      let qtyDisplay = `${y.qty || 0}${y.unit}`;
      if (y.unit === '고리') qtyDisplay += ` (${(y.qty * KORI_KG).toFixed(2)}kg)`;
      html += `<tr>
        <td>${escapeHtml(y.type) || '-'}</td>
        <td class="center">${qtyDisplay}</td>
        <td>${escapeHtml(y.dest) || '-'}</td>
        <td class="center">${escapeHtml(d.delivery) || '?'}</td>
        <td>${escapeHtml(d.purpose) || '-'}</td>
      </tr>`;
    });
    if (totalKg > 0) {
      html += `<tr class="total"><td class="center">합 계</td><td class="center">${totalKg.toFixed(2)}kg</td><td colspan="3"></td></tr>`;
    }
  }
  html += `</tbody></table>`;
  html += `<div class="wo-greeting" style="margin-top:10px;">※ 출고처 및 수량 주의 바랍니다.</div>`;
  
  if (d.notes) html += `<div class="wo-notes">${escapeHtml(d.notes)}</div>`;
  
  html += `<div class="wo-footer">
    <div>■ ADD : 262-31, Hoguk-ro, Soheul-eup, Pocheon-si, Gyeonggi-do, Republic of Korea</div>
    <div>■ TEL : 82+31-541-8651 / 8656　■ FAX : 82+31-541-8652 / 8655</div>
    <div>■ MAIL : manager@recoveric.com　■ HOMEPAGE : www.recoveric.com</div>
    <div class="sign-off">현일텍스 주식회사 드림</div>
  </div>`;
  return html;
}

// ===== 편직 의뢰서 렌더 =====
function renderKnitOrder(d) {
  const dateStr = d.date ? new Date(d.date).toLocaleDateString('ko-KR') : '-';
  
  let html = renderLetterhead();
  html += `<div class="wo-title-banner">편 직 의 뢰 서</div>`;
  html += `<div class="wo-meta"><span>의뢰일 : ${dateStr}</span><span>제 목 : 편직 의뢰의 건</span></div>`;
  html += `<div class="wo-recipient-box"><span class="label">수 신</span>${escapeHtml(d.recipient) || '-'}</div>`;
  html += `<div class="wo-section-header">■ 편직 요청 내역</div>`;
  
  if (d.items.length === 0) {
    html += `<div style="padding:20px;text-align:center;color:#888;">품목을 추가하세요</div>`;
  } else {
    d.items.forEach((item, idx) => {
      const totalKg = (item.jul || 0) * (item.kg_per_jul || 21);
      html += `<div class="wo-knit-item">
        <div class="wo-knit-item-num">${idx + 1}. ${escapeHtml(item.item) || '품목 미입력'}</div>
        <div class="wo-knit-detail">
          <div><span class="kd-label">@ 컬러</span>: ${escapeHtml(item.color) || '-'} / <strong>${item.jul || 0}절</strong></div>
          <div><span class="kd-label">ㄴ 예상 생산량</span>: ${totalKg.toFixed(1)}kg (${item.kg_per_jul || 21}KG/절)</div>
          <div><span class="kd-label">ㄴ 원사 입고</span>: ${escapeHtml(item.yarn_input) || '-'}</div>
        </div>
      </div>`;
    });
  }
  
  if (d.notes) html += `<div class="wo-notes">${escapeHtml(d.notes)}</div>`;
  
  html += `<div class="wo-footer">
    <div class="sign-off">현일텍스 주식회사 드림</div>
  </div>`;
  return html;
}

// ===== 카톡 텍스트 생성 =====
function generateKakaoText(d) {
  let text = `■ 편직요청\n`;
  d.items.forEach((item, idx) => {
    const totalKg = (item.jul || 0) * (item.kg_per_jul || 21);
    text += `\n${idx + 1}.\n# ${item.item || ''}\n@ ${item.color || ''} : ${item.jul || 0}절\n`;
    text += `ㄴ 예상 생산량 : ${totalKg.toFixed(1)}kg (${item.kg_per_jul || 21}KG/절)\n`;
    text += `ㄴ 원사 입고 : ${item.yarn_input || ''}\n`;
  });
  text += `\n편직 부탁 드립니다.`;
  return text;
}

// ===== 염색가공 의뢰서 렌더 =====
function renderFinishOrder(d) {
  const dateStr = d.date ? new Date(d.date).toLocaleDateString('ko-KR') : '-';
  const totalBody = d.colors.reduce((s, c) => s + (c.body || 0), 0);
  const totalRib = d.colors.reduce((s, c) => s + (c.rib || 0), 0);
  const processLabel = [];
  if (d.processes.dyeing) processLabel.push('염색');
  if (d.processes.processing) processLabel.push('가공');
  if (d.processes.post) processLabel.push('후가공');
  
  let html = renderLetterhead();
  html += `<div class="wo-title-banner">작 업 의 뢰 서</div>`;
  html += `<div class="wo-meta">
    <span>발주일 : ${dateStr}</span>
    <span>생산구분 : ${escapeHtml(d.production_type) || '-'}</span>
    <span>공정 : ${processLabel.join(' + ') || '-'}</span>
  </div>`;
  
  // 수신처
  let recList = [];
  if (d.processes.dyeing && d.recipients.dyeing) recList.push({ tag: '염색', name: d.recipients.dyeing });
  if (d.processes.processing && d.recipients.processing) recList.push({ tag: '가공', name: d.recipients.processing });
  if (d.processes.post && d.recipients.post) recList.push({ tag: '후가공', name: d.recipients.post });
  
  if (recList.length > 0) {
    html += `<div class="wo-recipient-box">`;
    recList.forEach((r, i) => {
      html += `<div style="${i>0?'margin-top:4px;':''}"><span class="label">[${r.tag}]</span>${escapeHtml(r.name)}</div>`;
    });
    html += `</div>`;
  }
  
  html += `<div class="wo-section-header">■ BODY</div>`;
  html += `<table class="wo-table">
    <tr><td class="label">품 목</td><td colspan="5">${escapeHtml(d.body.item) || '-'}</td></tr>
    <tr>
      <td class="label">입고처</td><td>${escapeHtml(d.body.receiving) || '-'}</td>
      <td class="label">출고처</td><td>${escapeHtml(d.body.shipping_from) || '-'} ▶ 현일</td>
      <td class="label">최종입고</td><td>${escapeHtml(d.final_destination) || '-'}</td>
    </tr>
    <tr><td class="label">사 종</td><td colspan="5">면 ${escapeHtml(d.body.yarn.cotton) || '-'} / 포리 ${escapeHtml(d.body.yarn.poly) || '-'} / 스판 ${escapeHtml(d.body.yarn.span) || '-'}</td></tr>
    <tr><td class="label">가공사양</td><td colspan="5">${escapeHtml(d.body.spec) || '-'}</td></tr>
  </table>`;
  
  // 주의사항
  if (d.processes.dyeing || d.processes.processing || d.processes.post) {
    html += `<div class="wo-section-header">■ CAUTION (주의 : 필독)</div>`;
    html += `<div style="display:grid; grid-template-columns: ${[d.processes.dyeing, d.processes.processing, d.processes.post].filter(x=>x).map(()=>'1fr').join(' ')}; gap: 6px;">`;
    if (d.processes.dyeing) {
      html += `<div>
        <div class="wo-caution-header">${escapeHtml(d.recipients.dyeing) || '염색'}</div>
        <table class="wo-caution-table">
          <tr><td class="star">★</td><td>터치</td><td>${escapeHtml(d.caution.touch)}</td></tr>
          <tr><td class="star">★</td><td>선바이오</td><td>${escapeHtml(d.caution.bio)}</td></tr>
          <tr><td class="star">★</td><td>시와 주의</td><td>${escapeHtml(d.caution.shiwa)}</td></tr>
          <tr><td class="star">※</td><td>뜯김 주의</td><td>${escapeHtml(d.caution.tearing)}</td></tr>
          <tr><td class="star">※</td><td>광목자국</td><td>${escapeHtml(d.caution.lightmark)}</td></tr>
          <tr><td class="star">※</td><td>대전방지제</td><td>${escapeHtml(d.caution.antistatic)}</td></tr>
        </table>
      </div>`;
    }
    if (d.processes.processing) {
      html += `<div>
        <div class="wo-caution-header">${escapeHtml(d.recipients.processing) || '가공'}</div>
        <table class="wo-caution-table">
          <tr><td class="star">★</td><td>유연제</td><td>${escapeHtml(d.caution.softener)}</td></tr>
          <tr><td class="star">★</td><td>정상가공</td><td>${escapeHtml(d.caution.normal)}</td></tr>
          <tr><td class="star">★</td><td>KC인증</td><td>${escapeHtml(d.caution.kc)}</td></tr>
          <tr><td class="star">※</td><td>견뢰도TEST</td><td>${escapeHtml(d.caution.fastness)}</td></tr>
          <tr><td class="star">※</td><td>탈유제 처리</td><td>${escapeHtml(d.caution.oil)}</td></tr>
          <tr><td class="star">※</td><td>냄새 주의</td><td>${escapeHtml(d.caution.smell)}</td></tr>
        </table>
      </div>`;
    }
    if (d.processes.post) {
      html += `<div>
        <div class="wo-caution-header">${escapeHtml(d.recipients.post) || '후가공'}</div>
        <table class="wo-caution-table">
          <tr><td class="star">★</td><td>기모</td><td>${escapeHtml(d.caution.napping) || '-'}</td></tr>
          <tr><td class="star">★</td><td>워싱</td><td>${escapeHtml(d.caution.washing) || '-'}</td></tr>
          <tr><td class="star">※</td><td>프린팅</td><td>${escapeHtml(d.caution.printing) || '-'}</td></tr>
          <tr><td class="star">※</td><td>기타</td><td>${escapeHtml(d.caution.etc) || '-'}</td></tr>
        </table>
      </div>`;
    }
    html += `</div>`;
  }
  
  html += `<div class="wo-section-header">■ COLOR & QUANTITY (단위: 절)</div>`;
  html += `<table class="wo-table"><thead><tr><th>컬 러</th><th>몸판 (절)</th><th>리프 (절)</th></tr></thead><tbody>`;
  if (d.colors.length === 0) {
    html += `<tr><td colspan="3" class="center" style="color:#888;">컬러를 추가하세요</td></tr>`;
  } else {
    d.colors.forEach(c => {
      html += `<tr><td>${escapeHtml(c.name) || '-'}</td><td class="center">${c.body || 0}</td><td class="center">${c.rib || 0}</td></tr>`;
    });
    html += `<tr class="total"><td class="center">소 계</td><td class="center">${totalBody}</td><td class="center">${totalRib}</td></tr>`;
  }
  html += `</tbody></table>`;
  
  if (d.notes) html += `<div class="wo-notes">${escapeHtml(d.notes)}</div>`;
  
  html += `<div class="wo-footer">
    <div>■ ADD : 262-31, Hoguk-ro, Soheul-eup, Pocheon-si, Gyeonggi-do, Republic of Korea</div>
    <div>■ TEL : 82+31-541-8651 / 8656　■ MAIL : manager@recoveric.com</div>
    <div class="sign-off">현일텍스 주식회사 드림</div>
  </div>`;
  return html;
}

function render() {
  const d = getFormData();
  let html = '';
  if (d.type === '원사') html = renderYarnOrder(d);
  else if (d.type === '편직') html = renderKnitOrder(d);
  else html = renderFinishOrder(d);
  document.getElementById('wo-doc').innerHTML = html;
}

document.getElementById('new-btn').addEventListener('click', () => {

document.getElementById('btn-print').addEventListener('click', () => window.print());

async function captureToCanvas() {
  const el = document.getElementById('wo-doc');
  return await html2canvas(el, { scale: 2, backgroundColor: '#ffffff', useCORS: true });
}

document.getElementById('btn-image').addEventListener('click', async () => {
  try {
    toast('이미지 생성 중...');
    const canvas = await captureToCanvas();
    const d = getFormData();
    const dateStr = (d.date || new Date().toISOString().split('T')[0]).replace(/-/g, '');
    let name = 'item';
    if (d.type === '원사') name = d.supplier || 'yarn';
    else if (d.type === '편직') name = d.items?.[0]?.item || 'knit';
    else name = d.body?.item || 'finish';
    name = name.replace(/[^\w가-힣]/g, '_');
    const filename = `${dateStr}_${d.type}_${name}.png`;
    canvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
      toast('이미지 저장 완료', 'success');
    });
  } catch (e) { console.error(e); toast('이미지 생성 실패', 'error'); }
});

document.getElementById('btn-copy').addEventListener('click', async () => {
  try {
    toast('클립보드 복사 중...');
    const canvas = await captureToCanvas();
    canvas.toBlob(async blob => {
      try {
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        toast('클립보드 복사 완료. 카톡에 붙여넣으세요', 'success');
      } catch (e) { toast('클립보드 이미지 복사 실패', 'error'); }
    });
  } catch (e) { toast('복사 실패', 'error'); }
});

document.getElementById('btn-kakao').addEventListener('click', async () => {
  const d = getFormData();
  if (d.type !== '편직') return;
  const text = generateKakaoText(d);
  try {
    await navigator.clipboard.writeText(text);
    toast('카톡 텍스트 복사 완료', 'success');
  } catch (e) {
    prompt('아래 텍스트를 복사하세요:', text);
  }
});

// ===== Firebase =====
window.addEventListener('firebase-ready', () => {
  const { auth, db, provider, signInWithPopup, signOut, onAuthStateChanged,
    collection, addDoc, updateDoc, deleteDoc, doc, 
    query, orderBy, onSnapshot, serverTimestamp } = window.firebase;
  
  onAuthStateChanged(auth, user => {
    if (user) {
      state.user = user;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('main-app').style.display = 'grid';
      renderUserInfo();
      loadWorkOrders();
      resetForm();
    } else {
      state.user = null;
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('main-app').style.display = 'none';
      if (state.unsubscribe) { state.unsubscribe(); state.unsubscribe = null; }
    }
  });
  
  document.getElementById('login-btn-main').addEventListener('click', async () => {
    try { await signInWithPopup(auth, provider); }
    catch (e) { toast('로그인 실패: ' + e.message, 'error'); }
  });
  
  function renderUserInfo() {
    const u = state.user;
    document.getElementById('user-info-section').innerHTML = `
      <div class="user-info">
        <div class="name">${escapeHtml(u.displayName || u.email)}</div>
        <div class="email">${escapeHtml(u.email)}</div>
        <button class="logout-btn" id="logout-btn">로그아웃</button>
      </div>
    `;
    document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));
  }
  
  function loadWorkOrders() {
    if (state.unsubscribe) state.unsubscribe();
    const q = query(collection(db, 'workorders'), orderBy('created_at', 'desc'));
    state.unsubscribe = onSnapshot(q, snapshot => {
      state.allWorkOrders = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      renderHistory();
    }, err => toast('이력 불러오기 실패: ' + err.message, 'error'));
  }
  
  function renderHistory() {
    const list = document.getElementById('history-list');
    if (state.allWorkOrders.length === 0) {
      list.innerHTML = '<div class="history-empty">의뢰서 없음</div>';
      return;
    }
    list.innerHTML = state.allWorkOrders.map(wo => {
      const d = wo.date ? new Date(wo.date).toLocaleDateString('ko-KR', {month:'short', day:'numeric'}) : '-';
      let title = '-', sub = '';
      if (wo.type === '원사') {
        title = wo.yarns?.[0]?.type || '-';
        sub = wo.supplier || '';
      } else if (wo.type === '편직') {
        title = wo.items?.[0]?.item || '-';
        sub = wo.recipient || '';
      } else {
        title = wo.body?.item || '-';
        sub = wo.final_destination || '';
      }
      const active = state.currentWorkOrderId === wo.id ? 'active' : '';
      return `
        <div class="history-item ${active}" data-id="${wo.id}">
          <div class="item-num"><span class="item-type">${wo.type || '-'}</span>${escapeHtml(wo.wo_number) || ''}</div>
          <div class="item-title">${escapeHtml(title)}</div>
          <div class="item-meta">${d} · ${escapeHtml(sub)}</div>
        </div>`;
    }).join('');
    list.querySelectorAll('.history-item').forEach(el => {
      el.addEventListener('click', () => {
        if (state.isDirty && !confirm('저장되지 않은 변경사항이 있습니다. 계속하시겠습니까?')) return;
        const id = el.dataset.id;
        const wo = state.allWorkOrders.find(x => x.id === id);
        if (wo) loadWorkOrder(wo);
      });
    });
  }
  
  function loadWorkOrder(wo) {
    state.currentWorkOrderId = wo.id;
    setFormData(wo);
    state.isDirty = false;
    document.querySelectorAll('.history-item').forEach(el => el.classList.toggle('active', el.dataset.id === wo.id));
    document.getElementById('delete-btn').style.display = 'inline-block';
    updateSaveStatus('저장됨', 'saved');
    render();
  }
  
  function generateWoNumber(type) {
    const today = new Date();
    const yyyymmdd = today.getFullYear() + String(today.getMonth()+1).padStart(2,'0') + String(today.getDate()).padStart(2,'0');
    const prefix = type === '원사' ? 'YN' : type === '편직' ? 'KN' : 'FN';
    const count = state.allWorkOrders.filter(wo => wo.wo_number && wo.wo_number.startsWith(`${prefix}-${yyyymmdd}`)).length;
    return `${prefix}-${yyyymmdd}-${String(count+1).padStart(3,'0')}`;
  }
  
  document.getElementById('save-btn').addEventListener('click', async () => {
    const saveBtn = document.getElementById('save-btn');
    saveBtn.disabled = true;
    saveBtn.textContent = '저장 중...';
    try {
      const d = getFormData();
      if (d.type === '원사' && !d.supplier) { toast('수신처를 입력하세요', 'error'); return; }
      if (d.type === '편직' && !d.recipient) { toast('수신처를 입력하세요', 'error'); return; }
      if (d.type === '염색가공' && !d.body.item) { toast('품목을 입력하세요', 'error'); return; }
      
      if (state.currentWorkOrderId) {
        await updateDoc(doc(db, 'workorders', state.currentWorkOrderId), {
          ...d, updated_at: serverTimestamp(), updated_by: state.user.email
        });
        toast('수정 완료', 'success');
      } else {
        const wo_number = generateWoNumber(d.type);
        const docRef = await addDoc(collection(db, 'workorders'), {
          ...d, wo_number,
          created_at: serverTimestamp(), created_by: state.user.email,
          updated_at: serverTimestamp(), updated_by: state.user.email
        });
        state.currentWorkOrderId = docRef.id;
        document.getElementById('delete-btn').style.display = 'inline-block';
        toast(`저장 완료: ${wo_number}`, 'success');
      }
      state.isDirty = false;
      updateSaveStatus('저장됨', 'saved');
    } catch (e) { console.error(e); toast('저장 실패: ' + e.message, 'error'); }
    finally { saveBtn.disabled = false; saveBtn.textContent = '저장'; }
  });
  
  document.getElementById('delete-btn').addEventListener('click', async () => {
    if (!state.currentWorkOrderId) return;
    if (!confirm('정말로 삭제하시겠습니까?')) return;
    try {
      await deleteDoc(doc(db, 'workorders', state.currentWorkOrderId));
      toast('삭제 완료', 'success');
      resetForm();
    } catch (e) { toast('삭제 실패: ' + e.message, 'error'); }
  });
});
