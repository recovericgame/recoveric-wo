<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RECOVERIC 작업의뢰서 시스템</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', -apple-system, sans-serif; background: #f5f5f5; color: #222; font-size: 14px; }
  
  .app { display: grid; grid-template-columns: 280px 1fr 1fr; height: 100vh; }
  .sidebar { background: #1a1a1a; color: #fff; padding: 20px; overflow-y: auto; }
  .form-panel { background: #fff; padding: 24px; overflow-y: auto; border-right: 1px solid #ddd; }
  .preview-panel { background: #f0f0f0; padding: 24px; overflow-y: auto; }
  
  .sidebar h1 { font-size: 16px; margin-bottom: 4px; letter-spacing: -0.5px; }
  .sidebar .sub { font-size: 11px; color: #888; margin-bottom: 20px; }
  .login-btn { background: #fff; color: #222; border: none; padding: 10px; width: 100%; border-radius: 4px; cursor: pointer; font-size: 13px; margin-bottom: 16px; font-weight: 500; }
  .login-btn:hover { background: #eee; }
  .user-info { background: #2a2a2a; padding: 10px; border-radius: 4px; font-size: 11px; margin-bottom: 16px; }
  .user-info .name { color: #fff; font-weight: 500; margin-bottom: 2px; }
  .user-info .email { color: #888; font-size: 10px; margin-bottom: 6px; }
  .logout-btn { background: transparent; color: #888; border: 1px solid #444; padding: 3px 8px; border-radius: 3px; cursor: pointer; font-size: 10px; }
  .logout-btn:hover { color: #fff; border-color: #fff; }
  .new-btn { background: #d97706; color: #fff; border: none; padding: 10px; width: 100%; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; margin-bottom: 12px; }
  .new-btn:hover { background: #b45309; }
  .history-title { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; margin-top: 16px; }
  .history-item { background: #2a2a2a; padding: 10px; border-radius: 4px; margin-bottom: 6px; cursor: pointer; font-size: 12px; transition: background 0.2s; position: relative; }
  .history-item:hover { background: #3a3a3a; }
  .history-item.active { background: #d97706; }
  .history-item.active .item-num, .history-item.active .item-meta { color: #fff1d6; }
  .history-item .item-num { color: #d97706; font-size: 10px; margin-bottom: 2px; font-weight: 500; }
  .history-item .item-title { font-weight: 500; margin-bottom: 2px; color: #fff; }
  .history-item .item-meta { color: #888; font-size: 10px; }
  .history-empty { color: #555; font-size: 11px; padding: 20px 0; text-align: center; }
  
  .form-panel h2 { font-size: 15px; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid #222; }
  .section { margin-bottom: 20px; }
  .section-title { font-size: 12px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .field { margin-bottom: 10px; }
  .field label { display: block; font-size: 11px; color: #666; margin-bottom: 3px; }
  .field input, .field select, .field textarea {
    width: 100%; padding: 6px 8px; border: 1px solid #ccc; border-radius: 3px; font-size: 13px; font-family: inherit;
  }
  .field textarea { resize: vertical; min-height: 50px; }
  .row { display: grid; gap: 8px; }
  .row-2 { grid-template-columns: 1fr 1fr; }
  .row-3 { grid-template-columns: 1fr 1fr 1fr; }
  .row-yarn { grid-template-columns: 40px 1fr 40px 1fr 40px 1fr; align-items: center; }
  .row-yarn label { font-size: 11px; color: #666; text-align: right; padding-right: 4px; margin: 0; }
  .row-yarn input { padding: 4px 6px; font-size: 12px; }
  
  .caution-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .caution-item { display: flex; align-items: center; gap: 4px; }
  .caution-item label { font-size: 11px; color: #444; white-space: nowrap; width: 70px; margin: 0; }
  .caution-item input[type="text"] { flex: 1; padding: 3px 6px; font-size: 11px; }
  
  .color-row { display: grid; grid-template-columns: 1fr 70px 70px 30px; gap: 6px; margin-bottom: 4px; align-items: center; }
  .color-row input { padding: 4px 6px; font-size: 12px; }
  .btn-del { background: #ef4444; color: #fff; border: none; border-radius: 3px; cursor: pointer; height: 26px; font-size: 11px; }
  .btn-add { background: #222; color: #fff; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-size: 11px; margin-top: 4px; }
  
  .actions { position: sticky; bottom: 0; background: #fff; padding-top: 12px; margin-top: 20px; border-top: 1px solid #eee; display: flex; gap: 8px; }
  .btn-save { flex: 1; background: #222; color: #fff; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; }
  .btn-save:hover:not(:disabled) { background: #000; }
  .btn-save:disabled { background: #ccc; cursor: not-allowed; }
  .btn-delete-wo { background: #dc2626; color: #fff; border: none; padding: 10px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  
  .preview-toolbar { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .tab-btn { background: #fff; border: 1px solid #ccc; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  .tab-btn:hover { background: #f5f5f5; }
  .tab-btn.active { background: #222; color: #fff; border-color: #222; }
  .action-btn { background: #d97706; color: #fff; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 500; }
  .action-btn:hover { background: #b45309; }
  .action-btn.secondary { background: #444; }
  .action-btn.secondary:hover { background: #222; }
  .action-btn.first-of-actions { margin-left: auto; }
  .action-btn:disabled { background: #999; cursor: not-allowed; }
  
  .wo-doc { background: #fff; padding: 30px; max-width: 700px; margin: 0 auto; font-family: 'Malgun Gothic', sans-serif; color: #000; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .wo-title { text-align: center; font-size: 20px; font-weight: 700; padding: 8px; border: 2px solid #000; margin-bottom: 16px; letter-spacing: 2px; }
  .wo-meta { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 12px; color: #444; }
  .wo-recipients { display: grid; grid-template-columns: 60px 20px 1fr 20px 20px 1fr; gap: 4px; align-items: center; padding: 6px 0; border-top: 1px solid #000; border-bottom: 1px solid #000; font-size: 12px; margin-bottom: 12px; }
  .wo-recipients .label { font-weight: 600; background: #eee; padding: 4px; text-align: center; }
  .wo-recipients .tag { background: #222; color: #fff; padding: 2px 6px; font-size: 10px; text-align: center; border-radius: 2px; }
  
  .wo-section-header { background: #222; color: #fff; padding: 5px 10px; font-size: 12px; font-weight: 600; margin: 12px 0 6px; }
  
  .wo-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .wo-table td { border: 1px solid #333; padding: 5px 8px; vertical-align: middle; }
  .wo-table td.label { background: #f0f0f0; font-weight: 600; text-align: center; width: 70px; }
  
  .wo-caution-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 8px; }
  .wo-caution-table td { padding: 3px 6px; vertical-align: middle; border: 1px solid #ccc; }
  .wo-caution-table td.star { width: 20px; text-align: center; color: #d97706; font-weight: bold; }
  .wo-caution-header { background: #555; color: #fff; padding: 4px 8px; font-size: 11px; font-weight: 600; margin-bottom: 0; }
  
  .wo-color-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .wo-color-table th { background: #444; color: #fff; padding: 5px; font-weight: 600; font-size: 11px; border: 1px solid #333; }
  .wo-color-table td { border: 1px solid #333; padding: 5px 8px; text-align: center; }
  .wo-color-table td.color-name { text-align: left; }
  .wo-color-table tr.total td { background: #f0f0f0; font-weight: 700; }
  
  .wo-notes { margin-top: 12px; padding: 10px; background: #fffbeb; border-left: 3px solid #d97706; font-size: 11px; white-space: pre-wrap; }
  .wo-footer { margin-top: 20px; padding-top: 12px; border-top: 1px solid #ddd; text-align: right; font-size: 10px; color: #666; }
  
  .save-status { font-size: 11px; color: #888; padding: 8px 0 0; text-align: center; }
  .save-status.unsaved { color: #d97706; font-weight: 500; }
  .save-status.saved { color: #059669; }
  
  @media print {
    .sidebar, .form-panel, .preview-toolbar { display: none !important; }
    .preview-panel { padding: 0; background: #fff; overflow: visible; }
    .wo-doc { box-shadow: none; max-width: 100%; padding: 15px; }
    .app { display: block; height: auto; }
  }
  
  .toast { position: fixed; top: 20px; right: 20px; background: #222; color: #fff; padding: 12px 20px; border-radius: 4px; font-size: 13px; z-index: 1000; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .toast.error { background: #dc2626; }
  .toast.success { background: #059669; }
  
  .login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; background: #f5f5f5; }
  .login-card { background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: center; max-width: 360px; }
  .login-card h1 { margin-bottom: 6px; font-size: 20px; }
  .login-card .sub { color: #888; font-size: 13px; margin-bottom: 24px; }
  .login-card button { background: #222; color: #fff; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 500; width: 100%; }
  .login-card button:hover { background: #000; }
</style>
</head>
<body>

<div class="login-screen" id="login-screen">
  <div class="login-card">
    <h1>RECOVERIC</h1>
    <div class="sub">작업의뢰서 시스템</div>
    <button id="login-btn-main">Google 계정으로 로그인</button>
  </div>
</div>

<div class="app" id="main-app" style="display:none;">
  <aside class="sidebar">
    <h1>RECOVERIC</h1>
    <div class="sub">작업의뢰서 시스템</div>
    <div id="user-info-section"></div>
    <button class="new-btn" id="new-btn">+ 새 작업의뢰서</button>
    <div class="history-title">이력</div>
    <div id="history-list"><div class="history-empty">불러오는 중...</div></div>
  </aside>
  
  <section class="form-panel" id="form-panel">
    <h2>작업의뢰서 입력</h2>
    
    <div class="section">
      <div class="section-title">기본 정보</div>
      <div class="row row-3">
        <div class="field">
          <label>발주일</label>
          <input type="date" id="order_date">
        </div>
        <div class="field">
          <label>생산구분</label>
          <select id="production_type">
            <option value="오더">오더</option>
            <option value="기획">기획</option>
            <option value="샘플">샘플</option>
            <option value="재염">재염</option>
          </select>
        </div>
        <div class="field">
          <label>최종입고처</label>
          <input type="text" id="final_destination" placeholder="세원">
        </div>
      </div>
    </div>
    
    <div class="section">
      <div class="section-title">수신처</div>
      <div class="row row-2">
        <div class="field">
          <label>염색처</label>
          <input type="text" id="dyeing_recipient" placeholder="대흥염색">
        </div>
        <div class="field">
          <label>가공처</label>
          <input type="text" id="processing_recipient" placeholder="대흥가공">
        </div>
      </div>
    </div>
    
    <div class="section">
      <div class="section-title">BODY</div>
      <div class="field">
        <label>품목</label>

      </div>
      <div class="row row-2">
        <div class="field">
          <label>입고처</label>
          <input type="text" id="receiving" placeholder="세원">
        </div>
        <div class="field">
          <label>출고처</label>

        </div>
      </div>
      <div class="field">

          <label>포리</label><input type="text" id="yarn_poly" placeholder="45">

      </div>

        <label>가공</label>
        <input type="text" id="processing_spec" placeholder="텐컴 후 70/72+400">

    </div>

      <div class="caution-grid" style="margin-bottom:10px;">
        <div class="caution-item"><label>터치</label><input type="text" id="c_touch" value="부드럽게"></div>
        <div class="caution-item"><label>선바이오</label><input type="text" id="c_bio" value="X"></div>
        <div class="caution-item"><label>시와주의</label><input type="text" id="c_shiwa" value="O"></div>
        <div class="caution-item"><label>뜯김주의</label><input type="text" id="c_tearing" value="O"></div>
        <div class="caution-item"><label>광목자국</label><input type="text" id="c_lightmark" value="O"></div>
        <div class="caution-item"><label>대전방지</label><input type="text" id="c_antistatic" value="O"></div>
      </div>
      <div style="font-size:11px; color:#666; margin-bottom:6px;">■ 가공</div>
      <div class="caution-grid" style="margin-bottom:10px;">
        <div class="caution-item"><label>유연제</label><input type="text" id="c_softener" value="O"></div>
        <div class="caution-item"><label>정상가공</label><input type="text" id="c_normal" value="O"></div>
        <div class="caution-item"><label>KC인증</label><input type="text" id="c_kc" value="O"></div>
        <div class="caution-item"><label>견뢰도</label><input type="text" id="c_fastness" value="O"></div>
        <div class="caution-item"><label>탈유제</label><input type="text" id="c_oil" value="O"></div>
        <div class="caution-item"><label>냄새주의</label><input type="text" id="c_smell" value="O"></div>

    <div class="section">
      <div class="section-title">컬러 & 수량</div>
      <div class="color-row" style="font-size:11px; color:#666;">

      </div>

      <button class="btn-add" id="add-color">+ 컬러 추가</button>
    </div>
    
    <div class="section">
      <div class="section-title">메모</div>

        <textarea id="notes" placeholder="몸판 : 양사이드 염색 + 텐타 + 컴팩 / 70/72*390g/y"></textarea>
      </div>
    </div>
    
    <div class="actions">
      <button class="btn-save" id="save-btn">저장</button>

  <section class="preview-panel">
    <div class="preview-toolbar">
      <button class="tab-btn active" data-type="통합">통합</button>
      <button class="tab-btn" data-type="원사">원사</button>
      <button class="tab-btn" data-type="편직">편직</button>
      <button class="tab-btn" data-type="염색">염색</button>
      <button class="tab-btn" data-type="가공">가공</button>
      <button class="action-btn first-of-actions" id="btn-image">이미지 저장</button>

    </div>
    <div id="preview-container">
      <div class="wo-doc" id="wo-doc"></div>
    </div>

<div class="toast" id="toast"></div>

<script>
const state = {
  currentDocType: '통합',
  currentWorkOrderId: null,
  user: null,
  allWorkOrders: [],
  isDirty: false,
  unsubscribe: null
};

function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  setTimeout(() => el.className = 'toast', 2500);
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function addColorRow(name='', body='', rib='') {
  const container = document.getElementById('colors-container');
  const row = document.createElement('div');
  row.className = 'color-row';
  row.innerHTML = `
    <input type="text" class="c-name" placeholder="프진먹색 #451A" value="${escapeHtml(name)}">
    <input type="number" class="c-body" placeholder="8" value="${body}" step="0.5">
    <input type="number" class="c-rib" placeholder="1" value="${rib}" step="0.5">
    <button class="btn-del">X</button>
  `;
  row.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('input', () => { render(); markDirty(); });
  });
  row.querySelector('.btn-del').addEventListener('click', () => { 
    row.remove(); render(); markDirty(); 
  });
  container.appendChild(row);
}

function getFormData() {
  const colors = [];
  document.querySelectorAll('#colors-container .color-row').forEach(row => {
    const name = row.querySelector('.c-name').value.trim();
    const body = parseFloat(row.querySelector('.c-body').value) || 0;
    const rib = parseFloat(row.querySelector('.c-rib').value) || 0;
    if (name || body || rib) colors.push({ name, body, rib });
  });
  return {
    order_date: document.getElementById('order_date').value,
    production_type: document.getElementById('production_type').value,
    final_destination: document.getElementById('final_destination').value,
    recipients: {
      dyeing: document.getElementById('dyeing_recipient').value,
      processing: document.getElementById('processing_recipient').value
    },
    body: {
      item: document.getElementById('item').value,
      receiving: document.getElementById('receiving').value,
      shipping_from: document.getElementById('shipping_from').value,
      yarn: {
        cotton: document.getElementById('yarn_cotton').value,
        poly: document.getElementById('yarn_poly').value,
        span: document.getElementById('yarn_span').value
      },
      processing: document.getElementById('processing_spec').value
    },
    caution: {
      touch: document.getElementById('c_touch').value,
      bio: document.getElementById('c_bio').value,
      shiwa: document.getElementById('c_shiwa').value,
      tearing: document.getElementById('c_tearing').value,
      lightmark: document.getElementById('c_lightmark').value,
      antistatic: document.getElementById('c_antistatic').value,
      softener: document.getElementById('c_softener').value,
      normal: document.getElementById('c_normal').value,
      kc: document.getElementById('c_kc').value,
      fastness: document.getElementById('c_fastness').value,
      oil: document.getElementById('c_oil').value,
      smell: document.getElementById('c_smell').value
    },
    colors,
    notes: document.getElementById('notes').value
  };
}

function setFormData(d) {
  if (!d) return;
  document.getElementById('order_date').value = d.order_date || '';
  document.getElementById('production_type').value = d.production_type || '오더';
  document.getElementById('final_destination').value = d.final_destination || '';
  document.getElementById('dyeing_recipient').value = d.recipients?.dyeing || '';
  document.getElementById('processing_recipient').value = d.recipients?.processing || '';
  document.getElementById('item').value = d.body?.item || '';
  document.getElementById('receiving').value = d.body?.receiving || '';
  document.getElementById('shipping_from').value = d.body?.shipping_from || '';
  document.getElementById('yarn_cotton').value = d.body?.yarn?.cotton || '';
  document.getElementById('yarn_poly').value = d.body?.yarn?.poly || '';
  document.getElementById('yarn_span').value = d.body?.yarn?.span || '';
  document.getElementById('processing_spec').value = d.body?.processing || '';
  document.getElementById('c_touch').value = d.caution?.touch || '';
  document.getElementById('c_bio').value = d.caution?.bio || '';
  document.getElementById('c_shiwa').value = d.caution?.shiwa || '';
  document.getElementById('c_tearing').value = d.caution?.tearing || '';
  document.getElementById('c_lightmark').value = d.caution?.lightmark || '';
  document.getElementById('c_antistatic').value = d.caution?.antistatic || '';
  document.getElementById('c_softener').value = d.caution?.softener || '';
  document.getElementById('c_normal').value = d.caution?.normal || '';
  document.getElementById('c_kc').value = d.caution?.kc || '';
  document.getElementById('c_fastness').value = d.caution?.fastness || '';
  document.getElementById('c_oil').value = d.caution?.oil || '';
  document.getElementById('c_smell').value = d.caution?.smell || '';
  document.getElementById('notes').value = d.notes || '';
  document.getElementById('colors-container').innerHTML = '';
  if (d.colors && d.colors.length > 0) {
    d.colors.forEach(c => addColorRow(c.name, c.body, c.rib));
  } else {
    addColorRow();
  }
}

function resetForm() {
  state.currentWorkOrderId = null;
  state.isDirty = false;
  document.getElementById('order_date').valueAsDate = new Date();
  document.getElementById('production_type').value = '오더';
  ['final_destination','dyeing_recipient','processing_recipient','item',
   'receiving','shipping_from','yarn_cotton','yarn_poly','yarn_span',
   'processing_spec','notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('c_touch').value = '부드럽게';
  document.getElementById('c_bio').value = 'X';
  ['c_shiwa','c_tearing','c_lightmark','c_antistatic','c_softener',
   'c_normal','c_kc','c_fastness','c_oil','c_smell'].forEach(id => 
    document.getElementById(id).value = 'O');
  document.getElementById('colors-container').innerHTML = '';
  addColorRow();
  document.querySelectorAll('.history-item').forEach(el => el.classList.remove('active'));
  document.getElementById('delete-btn').style.display = 'none';
  updateSaveStatus('');
  render();
}

function renderWorkOrder(data, type='통합') {
  const totalBody = data.colors.reduce((s, c) => s + (c.body || 0), 0);
  const totalRib = data.colors.reduce((s, c) => s + (c.rib || 0), 0);
  const today = new Date().toLocaleDateString('ko-KR');
  const orderDate = data.order_date ? new Date(data.order_date).toLocaleDateString('ko-KR') : today;
  
  let showDyeingCaution = true, showProcessingCaution = true, showRecipients = true, typeLabel = '';
  if (type === '원사') { showDyeingCaution = false; showProcessingCaution = false; typeLabel = ' - 원사'; }
  else if (type === '편직') { showDyeingCaution = false; showProcessingCaution = false; typeLabel = ' - 편직'; }
  else if (type === '염색') { showProcessingCaution = false; typeLabel = ' - 염색'; }
  else if (type === '가공') { showDyeingCaution = false; typeLabel = ' - 가공'; }
  
  let html = `
    <div class="wo-title">▣ 작 업 의 뢰 서${typeLabel} ▣</div>
    <div class="wo-meta">
      <span>발주일: ${orderDate}</span>
      <span>생산구분: ${escapeHtml(data.production_type) || '-'}</span>
      <span>출력일: ${today}</span>
    </div>
  `;
  
  if (showRecipients) {
    html += `
      <div class="wo-recipients">
        <div class="label">수 신</div>
        <div class="tag">1</div>
        <div>${escapeHtml(data.recipients.dyeing) || '-'}</div>
        <div></div>
        <div class="tag">2</div>
        <div>${escapeHtml(data.recipients.processing) || '-'}</div>
      </div>
    `;
  }
  
  html += `
    <div class="wo-section-header">■ BODY</div>
    <table class="wo-table">
      <tr><td class="label">품목</td><td colspan="5">${escapeHtml(data.body.item) || '-'}</td></tr>
      <tr>
        <td class="label">입고처</td><td>${escapeHtml(data.body.receiving) || '-'}</td>
        <td class="label">출고처</td><td>${escapeHtml(data.body.shipping_from) || '-'} ▶ 현일</td>
        <td class="label">최종입고</td><td>${escapeHtml(data.final_destination) || '-'}</td>
      </tr>
      <tr>
        <td class="label">사종</td>
        <td colspan="5">면 ${escapeHtml(data.body.yarn.cotton) || '-'} / 포리 ${escapeHtml(data.body.yarn.poly) || '-'} / 스판 ${escapeHtml(data.body.yarn.span) || '-'}</td>
      </tr>
      <tr><td class="label">가공</td><td colspan="5">${escapeHtml(data.body.processing) || '-'}</td></tr>
    </table>
  `;
  
  if (showDyeingCaution || showProcessingCaution) {
    html += `<div class="wo-section-header">■ CAUTION (주의 : 필독)</div>`;
    const dyeingRows = `
      <tr><td class="star">★</td><td>터치</td><td>${escapeHtml(data.caution.touch)}</td></tr>
      <tr><td class="star">★</td><td>선바이오</td><td>${escapeHtml(data.caution.bio)}</td></tr>
      <tr><td class="star">★</td><td>시와 주의</td><td>${escapeHtml(data.caution.shiwa)}</td></tr>
      <tr><td class="star">※</td><td>뜯김 주의</td><td>${escapeHtml(data.caution.tearing)}</td></tr>
      <tr><td class="star">※</td><td>광목자국</td><td>${escapeHtml(data.caution.lightmark)}</td></tr>
      <tr><td class="star">※</td><td>대전방지제</td><td>${escapeHtml(data.caution.antistatic)}</td></tr>
    `;
    const processingRows = `
      <tr><td class="star">★</td><td>유연제</td><td>${escapeHtml(data.caution.softener)}</td></tr>
      <tr><td class="star">★</td><td>정상가공</td><td>${escapeHtml(data.caution.normal)}</td></tr>
      <tr><td class="star">★</td><td>KC인증</td><td>${escapeHtml(data.caution.kc)}</td></tr>
      <tr><td class="star">※</td><td>견뢰도TEST</td><td>${escapeHtml(data.caution.fastness)}</td></tr>
      <tr><td class="star">※</td><td>탈유제 처리</td><td>${escapeHtml(data.caution.oil)}</td></tr>
      <tr><td class="star">※</td><td>냄새 주의</td><td>${escapeHtml(data.caution.smell)}</td></tr>
    `;
    if (showDyeingCaution && showProcessingCaution) {
      html += `
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 6px;">
          <div>
            <div class="wo-caution-header">${escapeHtml(data.recipients.dyeing) || '염색'}</div>
            <table class="wo-caution-table">${dyeingRows}</table>
          </div>
          <div>
            <div class="wo-caution-header">${escapeHtml(data.recipients.processing) || '가공'}</div>
            <table class="wo-caution-table">${processingRows}</table>
          </div>
        </div>
      `;
    } else if (showDyeingCaution) {
      html += `
        <div class="wo-caution-header">${escapeHtml(data.recipients.dyeing) || '염색'}</div>
        <table class="wo-caution-table">${dyeingRows}</table>
      `;
    } else {
      html += `
        <div class="wo-caution-header">${escapeHtml(data.recipients.processing) || '가공'}</div>
        <table class="wo-caution-table">${processingRows}</table>
      `;
    }
  }
  
  html += `
    <div class="wo-section-header">■ COLOR & QUANTITY</div>
    <table class="wo-color-table">
      <thead><tr><th>컬러</th><th>몸판 (yd)</th><th>RIB (yd)</th></tr></thead>
      <tbody>
  `;
  if (data.colors.length === 0) {
    html += `<tr><td colspan="3" style="color:#999;">컬러를 추가하세요</td></tr>`;
  } else {
    data.colors.forEach(c => {
      html += `<tr><td class="color-name">${escapeHtml(c.name) || '-'}</td><td>${c.body || 0}</td><td>${c.rib || 0}</td></tr>`;
    });
    html += `<tr class="total"><td>소계</td><td>${totalBody}</td><td>${totalRib}</td></tr>`;
  }
  html += `</tbody></table>`;
  
  if (data.notes) {
    html += `<div class="wo-notes">${escapeHtml(data.notes)}</div>`;
  }
  html += `<div class="wo-footer">RECOVERIC · 현일텍스 주식회사</div>`;
  return html;
}

function render() {
  const data = getFormData();
  document.getElementById('wo-doc').innerHTML = renderWorkOrder(data, state.currentDocType);
}

function updateSaveStatus(text, type='') {
  const el = document.getElementById('save-status');
  el.textContent = text;
  el.className = 'save-status ' + type;
}

function markDirty() {
  if (!state.isDirty) {
    state.isDirty = true;
    updateSaveStatus('● 저장되지 않은 변경사항', 'unsaved');
  }
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.currentDocType = btn.dataset.type;
    render();
  });
});

document.getElementById('form-panel').addEventListener('input', () => { render(); markDirty(); });
document.getElementById('add-color').addEventListener('click', () => { addColorRow(); render(); markDirty(); });
document.getElementById('new-btn').addEventListener('click', () => {
  if (state.isDirty && !confirm('저장되지 않은 변경사항이 있습니다. 계속하시겠습니까?')) return;
  resetForm();
});
document.getElementById('btn-print').addEventListener('click', () => window.print());

async function captureToCanvas() {
  const el = document.getElementById('wo-doc');
  return await html2canvas(el, { scale: 2, backgroundColor: '#ffffff', useCORS: true });
}

document.getElementById('btn-image').addEventListener('click', async () => {
  try {
    toast('이미지 생성 중...', '');
    const canvas = await captureToCanvas();
    const data = getFormData();
    const dateStr = (data.order_date || new Date().toISOString().split('T')[0]).replace(/-/g, '');
    const item = (data.body.item || 'item').replace(/[^\w가-힣]/g, '_');
    const type = state.currentDocType;
    const filename = `${dateStr}_${type}_${item}.png`;
    canvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
      toast('이미지 저장 완료', 'success');
    });
  } catch (e) {
    console.error(e);
    toast('이미지 생성 실패', 'error');
  }
});

document.getElementById('btn-copy').addEventListener('click', async () => {
  try {
    toast('클립보드 복사 중...', '');
    const canvas = await captureToCanvas();
    canvas.toBlob(async blob => {
      try {
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        toast('클립보드 복사 완료. 카톡에 붙여넣으세요', 'success');
      } catch (e) {
        console.error(e);
        toast('브라우저가 클립보드 이미지를 지원하지 않습니다', 'error');
      }
    });
  } catch (e) {
    console.error(e);
    toast('복사 실패', 'error');
  }
});

window.addEventListener('firebase-ready', () => {
  const { auth, db, provider, signInWithPopup, signOut, onAuthStateChanged,
    collection, addDoc, updateDoc, deleteDoc, doc, 
    query, orderBy, onSnapshot, serverTimestamp } = window.firebase;
  
  onAuthStateChanged(auth, user => {
    if (user) {
      state.user = user;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('main-app').style.display = 'grid';
      renderUserInfo();
      loadWorkOrders();
      resetForm();
    } else {
      state.user = null;
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('main-app').style.display = 'none';
      if (state.unsubscribe) { state.unsubscribe(); state.unsubscribe = null; }
    }
  });
  
  async function doLogin() {
    try {
      await signInWithPopup(auth, provider);
    } catch (e) {
      console.error(e);
      toast('로그인 실패: ' + e.message, 'error');
    }
  }
  document.getElementById('login-btn-main').addEventListener('click', doLogin);
  
  function renderUserInfo() {
    const u = state.user;
    document.getElementById('user-info-section').innerHTML = `
      <div class="user-info">
        <div class="name">${escapeHtml(u.displayName || u.email)}</div>
        <div class="email">${escapeHtml(u.email)}</div>
        <button class="logout-btn" id="logout-btn">로그아웃</button>
      </div>
    `;
    document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));
  }
  
  function loadWorkOrders() {
    if (state.unsubscribe) state.unsubscribe();
    const q = query(collection(db, 'workorders'), orderBy('created_at', 'desc'));
    state.unsubscribe = onSnapshot(q, snapshot => {
      state.allWorkOrders = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      renderHistory();
    }, err => {
      console.error(err);
      toast('이력 불러오기 실패: ' + err.message, 'error');
    });
  }
  
  function renderHistory() {
    const list = document.getElementById('history-list');
    if (state.allWorkOrders.length === 0) {
      list.innerHTML = '<div class="history-empty">작업의뢰서 없음</div>';
      return;
    }
    list.innerHTML = state.allWorkOrders.map(wo => {
      const d = wo.order_date ? new Date(wo.order_date).toLocaleDateString('ko-KR') : '-';
      const item = wo.body?.item || '-';
      const color = wo.colors?.[0]?.name || '';
      const dest = wo.final_destination || '';
      const active = state.currentWorkOrderId === wo.id ? 'active' : '';
      return `
        <div class="history-item ${active}" data-id="${wo.id}">
          <div class="item-num">${escapeHtml(wo.wo_number) || ''}</div>
          <div class="item-title">${escapeHtml(item)}</div>
          <div class="item-meta">${d} · ${escapeHtml(dest)} · ${escapeHtml(color)}</div>
        </div>
      `;
    }).join('');
    list.querySelectorAll('.history-item').forEach(el => {
      el.addEventListener('click', () => {
        if (state.isDirty && !confirm('저장되지 않은 변경사항이 있습니다. 계속하시겠습니까?')) return;
        const id = el.dataset.id;
        const wo = state.allWorkOrders.find(x => x.id === id);
        if (wo) loadWorkOrder(wo);
      });
    });
  }
  
  function loadWorkOrder(wo) {
    state.currentWorkOrderId = wo.id;
    setFormData(wo);
    state.isDirty = false;
    document.querySelectorAll('.history-item').forEach(el => {
      el.classList.toggle('active', el.dataset.id === wo.id);
    });
    document.getElementById('delete-btn').style.display = 'inline-block';
    updateSaveStatus('저장됨', 'saved');
    render();
  }
  
  function generateWoNumber() {
    const today = new Date();
    const yyyymmdd = today.getFullYear() + 
      String(today.getMonth() + 1).padStart(2, '0') + 
      String(today.getDate()).padStart(2, '0');
    const todayCount = state.allWorkOrders.filter(wo => 
      wo.wo_number && wo.wo_number.startsWith(`WO-${yyyymmdd}`)
    ).length;
    return `WO-${yyyymmdd}-${String(todayCount + 1).padStart(3, '0')}`;
  }
  
  document.getElementById('save-btn').addEventListener('click', async () => {
    const saveBtn = document.getElementById('save-btn');
    saveBtn.disabled = true;
    saveBtn.textContent = '저장 중...';
    try {
      const data = getFormData();
      if (!data.body.item) {
        toast('품목을 입력해주세요', 'error');
        return;
      }
      if (state.currentWorkOrderId) {
        await updateDoc(doc(db, 'workorders', state.currentWorkOrderId), {
          ...data,
          updated_at: serverTimestamp(),
          updated_by: state.user.email
        });
        toast('수정 완료', 'success');
      } else {
        const wo_number = generateWoNumber();
        const docRef = await addDoc(collection(db, 'workorders'), {
          ...data,
          wo_number,
          created_at: serverTimestamp(),
          created_by: state.user.email,
          updated_at: serverTimestamp(),
          updated_by: state.user.email
        });
        state.currentWorkOrderId = docRef.id;
        document.getElementById('delete-btn').style.display = 'inline-block';
        toast(`저장 완료: ${wo_number}`, 'success');
      }
      state.isDirty = false;
      updateSaveStatus('저장됨', 'saved');
    } catch (e) {
      console.error(e);
      toast('저장 실패: ' + e.message, 'error');
    } finally {
      saveBtn.disabled = false;
      saveBtn.textContent = '저장';
    }
  });
  
  document.getElementById('delete-btn').addEventListener('click', async () => {
    if (!state.currentWorkOrderId) return;
    if (!confirm('정말로 이 작업의뢰서를 삭제하시겠습니까?')) return;
    try {
      await deleteDoc(doc(db, 'workorders', state.currentWorkOrderId));
      toast('삭제 완료', 'success');
      resetForm();
    } catch (e) {
      console.error(e);
      toast('삭제 실패: ' + e.message, 'error');
    }
  });
});

addColorRow();
document.getElementById('order_date').valueAsDate = new Date();
render();

window.addEventListener('beforeunload', (e) => {
  if (state.isDirty) { e.preventDefault(); e.returnValue = ''; }
});
</script>
</body>
</html>
